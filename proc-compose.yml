merge:
  client: 8080   # Vite (unchanged from vite.config.ts)
  server: 8787   # Express
  port: 3000     # single port developer opens in browser

processes:
  backend:
    cmd: bun run dev
    dir: ./server
    env:
      PORT: "8787"
      STORE_DRIVER: "postgres"
      DATABASE_URL: "postgresql://postgres@localhost/qck_admin"
      OPENAI_API_KEY: "REDACTED-OPENAI-KEY"
      ADMIN_PASSWORD_HASH: "$2b$10$RbSfKv2ZZQVAZh5TOshGA.c4keWab8wKqfPo9a.y9fgip4KpLCcZ."
    restart: on-failure
    ready_when:
      http: http://localhost:8787/health

  frontend:
    cmd: bun run dev
    env:
      PORT: "8080"
    depends_on:
      - backend
    ready_when:
      log: "ready in"
